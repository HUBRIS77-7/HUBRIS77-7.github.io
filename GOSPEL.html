<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:       #06070d;
  --surface:  #090b16;
  --surface2: #0c0f1e;
  --border:   #0d2030;
  --cyan:     #00e5ff;
  --green:    #00ff8c;
  --amber:    #ffaa00;
  --red:      #ff3355;
  --text:     #7aa4b8;
  --textdim:  #2a4a5a;
  --texthi:   #c8e0ee;
  --mono:     'Share Tech Mono',monospace;
}

html,body{width:100%;height:100%;background:var(--bg);color:var(--text);
  font-family:var(--mono);overflow:hidden}

/* ─────────── SQUARES OVERLAY ─────────── */
#sq-overlay{position:fixed;inset:0;z-index:200;pointer-events:none}
.sq{position:absolute;will-change:transform,opacity;
  transition:transform .18s ease-in,opacity .18s ease-in}
.sq.gone{transform:scale(0) rotate(12deg)!important;opacity:0!important}

/* ─────────── GREEK LETTERS ─────────── */
#letters{
  position:fixed;z-index:150;display:flex;gap:.04em;
  pointer-events:none;
}
.gletter{
  font-family:'Orbitron',sans-serif;font-weight:900;
  color:transparent;-webkit-text-stroke:3px var(--cyan);
  text-shadow:0 0 30px rgba(0,229,255,.7),0 0 80px rgba(0,229,255,.3),
              0 0 140px rgba(0,229,255,.12);
  line-height:1;
}

/* ─────────── CONSOLE ─────────── */
#console{
  position:fixed;inset:0;z-index:90;display:flex;flex-direction:column;
  opacity:0;pointer-events:none;transition:opacity .6s ease}
#console.visible{opacity:1;pointer-events:all}

/* TOP BAR */
#top-bar{
  height:52px;background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 18px;gap:0;flex-shrink:0}
.wc{display:flex;align-items:center;gap:7px;margin-right:16px}
.dot{width:11px;height:11px;border-radius:50%}
.dr{background:#ff3b30;box-shadow:0 0 6px #ff3b3066}
.dy{background:#ffcc00;box-shadow:0 0 6px #ffcc0066}
.dg{background:#34c759;box-shadow:0 0 6px #34c75966}
#tbar-spacer{width:72px} /* room for floating letters */
#tbar-title{font-size:.62rem;color:var(--textdim);letter-spacing:.18em;margin-right:auto}
#tbar-clock{font-size:.6rem;color:var(--textdim)}

/* STATUS BAR */
#status-bar{
  height:26px;background:var(--bg);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 16px;font-size:.58rem;
  color:var(--textdim);gap:22px;flex-shrink:0}
.si b{color:var(--green);font-weight:normal}

/* WORKSPACE */
#workspace{display:flex;flex:1;overflow:hidden}

/* FILE TREE */
#tree{
  width:210px;flex-shrink:0;background:var(--surface);
  border-right:1px solid var(--border);overflow-y:auto;padding:8px 0}
#tree::-webkit-scrollbar{width:3px}
#tree::-webkit-scrollbar-thumb{background:var(--border)}
.th{padding:4px 14px;font-size:.57rem;color:var(--textdim);
    letter-spacing:.15em;text-transform:uppercase;margin-bottom:2px}
.ti{
  display:flex;align-items:center;padding:5px 0;
  padding-left:calc(12px + var(--d,0)*13px);
  font-size:.7rem;cursor:pointer;user-select:none;gap:5px;
  color:var(--text);transition:background .1s,color .1s}
.ti:hover{background:rgba(0,229,255,.04);color:var(--texthi)}
.ti.act{background:rgba(0,229,255,.09);color:var(--cyan)}
.ti.lck{color:var(--textdim);cursor:not-allowed}
.ti.lck:hover{background:rgba(255,51,85,.04);color:var(--red)}
.ico{font-style:normal;font-size:.68rem;flex-shrink:0}
.icf{color:var(--amber)}
.icfl{color:var(--textdim)}

/* VIEWER */
#viewer{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
#viewer::after{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:5;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,
    rgba(0,0,0,.07) 3px,rgba(0,0,0,.07) 4px)}
#viewer::before{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:4;
  background:radial-gradient(ellipse at 50% 40%,transparent 55%,rgba(0,0,0,.55) 100%)}
#vh{
  padding:7px 16px;border-bottom:1px solid var(--border);
  font-size:.6rem;color:var(--textdim);display:flex;align-items:center;
  gap:8px;background:rgba(9,11,22,.9);flex-shrink:0;z-index:6;position:relative}
#vpath{color:var(--amber)}
#vc{
  flex:1;overflow-y:auto;padding:22px 28px;font-size:.76rem;
  line-height:1.75;color:var(--text);position:relative;z-index:6}
#vc::-webkit-scrollbar{width:3px}
#vc::-webkit-scrollbar-thumb{background:var(--border)}

/* FILE CONTENT SYNTAX */
.fc{white-space:pre-wrap;word-break:break-word}
.fc .kw{color:var(--cyan)}
.fc .val{color:var(--green)}
.fc .cmt{color:var(--textdim)}
.fc .er{color:var(--red)}
.fc .am{color:var(--amber)}
.fc .hd{color:var(--cyan);letter-spacing:.04em}
.fc .ok{color:var(--green)}
.fc .br{color:var(--textdim)}

/* CURSOR */
.cur{display:inline-block;width:7px;height:1em;background:var(--cyan);
  opacity:.8;vertical-align:text-bottom;animation:blink 1s step-end infinite}
@keyframes blink{0%,100%{opacity:.8}50%{opacity:0}}

/* BOTTOM BAR */
#bot{
  height:22px;background:var(--surface);border-top:1px solid var(--border);
  display:flex;align-items:center;padding:0 14px;
  font-size:.57rem;color:var(--textdim);gap:18px;flex-shrink:0}
.bti{display:flex;align-items:center;gap:5px}
.pulse{width:6px;height:6px;border-radius:50%;background:var(--green);
  box-shadow:0 0 5px var(--green);animation:pls 2s ease-in-out infinite}
@keyframes pls{0%,100%{opacity:1}50%{opacity:.25}}

/* WELCOME BOOT TEXT */
#boot-lines .bl{display:block;color:var(--textdim);font-size:.72rem;line-height:1.6;
  opacity:0;transform:translateY(4px);transition:opacity .25s,transform .25s}
#boot-lines .bl.show{opacity:1;transform:none}
</style>
</head>

function initSquares() {
  const overlay = document.getElementById('sq-overlay');
  const SZ = 58;
  const cols = Math.ceil(window.innerWidth / SZ) + 1;
  const rows = Math.ceil(window.innerHeight / SZ) + 1;
  const hues = [0,15,32,55,80,120,160,185,200,220,245,270,300,330];
  const squares = [];

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const el = document.createElement('div');
      el.className = 'sq';
      const h = hues[Math.floor(Math.random() * hues.length)] + (Math.random()*16-8);
      const s = 72 + Math.random()*28;
      const l = 42 + Math.random()*22;
      el.style.cssText =
        `left:${c*SZ}px;top:${r*SZ}px;width:${SZ+1}px;height:${SZ+1}px;` +
        `background:hsl(${h},${s}%,${l}%)`;
      overlay.appendChild(el);
      squares.push(el);
    }
  }

  // Fisher-Yates shuffle
  for (let i = squares.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [squares[i], squares[j]] = [squares[j], squares[i]];
  }
  return squares;
}

function runSquares(squares) {
  const IV = 4.5; // ms per square
  squares.forEach((sq, i) =>
    setTimeout(() => sq.classList.add('gone'), i * IV));

  // After all gone → hide overlay
  setTimeout(() => {
    document.getElementById('sq-overlay').remove();
  }, squares.length * IV + 300);

  // Move letters when last squares going
  setTimeout(() => {
    moveLetters();
  }, squares.length * IV - 80);
}

// ══════════════════════════════════════════════════════
//  LETTERS
// ══════════════════════════════════════════════════════
function placeLettersCentered() {
  const el = document.getElementById('letters');
  const fs = Math.min(window.innerWidth * 0.21, window.innerHeight * 0.33);
  el.style.cssText =
    `position:fixed;z-index:150;display:flex;gap:.04em;pointer-events:none;` +
    `font-size:${fs}px;top:50%;left:50%;transform:translate(-50%,-50%)`;
  return fs;
}

function moveLetters() {
  const el = document.getElementById('letters');
  const rect = el.getBoundingClientRect();

  // Snap off transform centering
  el.style.transition = 'none';
  el.style.transform = 'none';
  el.style.top = rect.top + 'px';
  el.style.left = rect.left + 'px';

  el.getBoundingClientRect(); // reflow

  // Animate to top-left
  el.style.transition =
    'top .78s cubic-bezier(.4,0,.2,1),' +
    'left .78s cubic-bezier(.4,0,.2,1),' +
    'font-size .78s cubic-bezier(.4,0,.2,1),' +
    'opacity .5s ease';
  el.style.top  = '14px';
  el.style.left = '72px';
  el.style.fontSize = '20px';

  setTimeout(showConsole, 820);
}

// ══════════════════════════════════════════════════════
//  CONSOLE REVEAL
// ══════════════════════════════════════════════════════
function showConsole() {
  const con = document.getElementById('console');
  con.classList.add('visible');
  // After console fully in, fade floating letters (console top-bar covers them)
  setTimeout(() => {
    const el = document.getElementById('letters');
    el.style.opacity = '0';
    setTimeout(() => el.remove(), 600);
  }, 500);
  animateBootLines();
}

function animateBootLines() {
  const container = document.getElementById('boot-lines');
  const lines = [
    `<span class="cmt">ΗΤΑ-TERMINAL  /  SESSION INIT</span>`,
    `<span class="br">────────────────────────────────────────</span>`,
    `<span class="kw">session_id</span>   <span class="val">${rhex(24)}</span>`,
    `<span class="kw">operator</span>     <span class="val">AUTHENTICATED</span>`,
    `<span class="kw">clearance</span>    <span class="er">SIGMA-3</span>`,
    `<span class="kw">node</span>         <span class="val">ΗΤΑ-PRIMARY  /  10.44.7.21</span>`,
    `<span class="kw">enc</span>          <span class="val">AES-256-GCM  /  active</span>`,
    `<span class="br">────────────────────────────────────────</span>`,
    `<span class="cmt">Filesystem mounted. ${Object.keys(FS).length + 6} objects indexed.</span>`,
    `<span class="cmt">Select a file from the tree to begin.</span>`,
    `<span class="ok">READY</span> <span class="cur"></span>`,
  ];

  lines.forEach((html, i) => {
    const span = document.createElement('span');
    span.className = 'bl';
    span.innerHTML = html;
    container.appendChild(span);
    setTimeout(() => span.classList.add('show'), i * 90);
  });
}

// ══════════════════════════════════════════════════════
//  FILE TREE
// ══════════════════════════════════════════════════════
function buildTree() {
  const treeEl = document.getElementById('tree');

  function makeItem(label, depth, opts = {}) {
    const div = document.createElement('div');
    div.className = 'ti' + (opts.cls ? ' ' + opts.cls : '');
    div.style.setProperty('--d', depth);
    div.innerHTML = `<span class="ico ${opts.iconClass||''}">${opts.icon||'·'}</span><span>${label}</span>${opts.suffix||''}`;
    return div;
  }

  // Root
  const root = makeItem('ΗΤΑ://', 0, {icon:'◈', iconClass:'', cls:''});
  root.style.color = 'var(--cyan)';
  root.querySelector('.ico').style.color = 'var(--cyan)';
  treeEl.appendChild(root);

  function addFile(name, nodeData, depth, path) {
    if (nodeData.locked) {
      const item = makeItem(name, depth, {
        icon:'⊘', iconClass:'',
        suffix:`<span style="font-size:.58rem;color:var(--er);margin-left:6px;color:var(--red)">[LOCKED]</span>`,
        cls:'lck'
      });
      item.querySelector('.ico').style.color = 'var(--red)';
      item.addEventListener('click', () => showLocked(name, path));
      treeEl.appendChild(item);
    } else {
      const item = makeItem(name, depth, {icon:'·', iconClass:'icfl'});
      item.addEventListener('click', () => {
        document.querySelectorAll('.ti.act').forEach(x => x.classList.remove('act'));
        item.classList.add('act');
        document.getElementById('sel-file').textContent = path;
        showFile(name, nodeData, path);
      });
      treeEl.appendChild(item);
    }
  }

  function addFolder(key, data, depth) {
    const name = key.replace('__','');
    const toggle = makeItem(name + '/', depth, {icon:'▾', iconClass:'icf'});
    treeEl.appendChild(toggle);
    const children = [];

    for (const [k, v] of Object.entries(data)) {
      if (k === '__folder') continue;
      if (v.__folder) {
        addFolder(k, v, depth + 1);
      } else {
        const path = name + '/' + k;
        addFile(k, v, depth + 1, path);
      }
    }

    let open = true;
    toggle.addEventListener('click', () => {
      open = !open;
      toggle.querySelector('.ico').textContent = open ? '▾' : '▸';
    });
  }

  // Top-level items
  for (const [k, v] of Object.entries(FS)) {
    if (v.__folder) {
      addFolder(k, v, 1);
    } else {
      addFile(k, v, 1, k);
    }
  }
}

// ══════════════════════════════════════════════════════
//  VIEWER
// ══════════════════════════════════════════════════════
function showFile(name, node, path) {
  const vc = document.getElementById('vc');
  const vpath = document.getElementById('vpath');
  const lcount = document.getElementById('lcount');

  vpath.textContent = 'ΗΤΑ:/' + path;
  const lines = node.content.replace(/<[^>]+>/g,'').split('\n').length;
  lcount.textContent = lines + ' ln';

  const div = document.createElement('div');
  div.className = 'fc';
  div.style.opacity = '0';
  div.style.transition = 'opacity .28s ease';
  div.innerHTML = node.content + '\n\n<span class="cur"></span>';

  vc.innerHTML = '';
  vc.appendChild(div);
  vc.scrollTop = 0;
  requestAnimationFrame(() => requestAnimationFrame(() => div.style.opacity = '1'));
}

function showLocked(name, path) {
  const vc = document.getElementById('vc');
  document.getElementById('vpath').textContent = 'ΗΤΑ:/' + path;
  document.getElementById('lcount').textContent = '';
  document.getElementById('sel-file').textContent = path;
  vc.innerHTML = `<div class="fc">
<span class="er">ACCESS DENIED</span>
<span class="br">════════════════════════════════</span>

File:     <span class="val">${name}</span>
Status:   <span class="er">LOCKED  /  ENCRYPTED</span>

This file requires additional clearance
beyond your current authorization level.

<span class="am">Required clearance:  OMEGA-1</span>
<span class="am">Your clearance:      SIGMA-3</span>

Contact CONTROL to request elevated access.

<span class="cmt">// ACCESS ATTEMPT LOGGED</span>
<span class="cur"></span>
</div>`;
}

// ══════════════════════════════════════════════════════
//  UTILITIES
// ══════════════════════════════════════════════════════
function rhex(n) {
  return Array.from({length:n},()=>Math.floor(Math.random()*16).toString(16)).join('');
}

const t0 = Date.now();
function tick() {
  const now = new Date();
  const iso = now.toISOString().replace('T',' ').slice(0,19) + ' UTC';
  document.getElementById('tbar-clock').textContent = iso;

  const s = Math.floor((Date.now()-t0)/1000);
  const hh = String(Math.floor(s/3600)).padStart(2,'0');
  const mm = String(Math.floor((s%3600)/60)).padStart(2,'0');
  const ss = String(s%60).padStart(2,'0');
  const up = document.getElementById('uptime');
  if (up) up.textContent = `${hh}:${mm}:${ss}`;
}

// ══════════════════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════════════════
window.addEventListener('load', () => {
  buildTree();
  tick();
  setInterval(tick, 1000);

  placeLettersCentered();
  const squares = initSquares();
  setTimeout(() => runSquares(squares), 250);
});
</script>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>It'll Be Alright</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Source+Sans+3:ital@0;1&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080808;
      --fg: #e8e2d9;
      --dim: #6b6560;
      --red: #c0392b;
      --white: #ffffff;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: 'Source Sans 3', sans-serif;
      overflow-x: hidden;
    }

    /* subtle grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
      opacity: 0.35;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5vw 6vw 10vw;
      gap: 8vh;
    }

    /* ── HERO TEXT ─────────────────────────────────────────── */
    .hero {
      width: 100%;
      text-align: left;
      line-height: 1;
      padding-bottom: 2vh;
      border-bottom: 1px solid #1e1e1e;
    }

    .hero-line {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 700;
      font-style: normal;
      font-size: clamp(3.6rem, 11vw, 12rem);
      color: var(--fg);
      letter-spacing: -0.015em;
      line-height: 0.95;
      display: block;
      white-space: normal;
      overflow-wrap: anywhere;
    }

    .hero-line span.comma { color: var(--dim); }

    /* ── HEARTBEAT SECTION ─────────────────────────────────── */
    .monitor-section {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 1.2rem;
    }

    .monitor-wrap {
      width: calc(100% + 6vw);
      margin-left: -6vw;
      position: relative;
      height: 120px;
      background: transparent;
      overflow: hidden;
    }

    #heartCanvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .monitor-label {
      font-family: 'Source Sans 3', sans-serif;
      font-style: italic;
      font-size: clamp(0.65rem, 1.1vw, 0.85rem);
      color: var(--dim);
      letter-spacing: 0.04em;
    }

    .triangle-label {
      font-family: 'Source Sans 3', sans-serif;
      font-style: italic;
      font-size: clamp(0.65rem, 1.1vw, 0.85rem);
      color: var(--dim);
      letter-spacing: 0.04em;
      margin-top: 0.6rem;
    }

    .triangle-section {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .track {
      width: calc(100% + 6vw);
      margin-left: -6vw;
      height: 48px;
      position: relative;
      display: flex;
      align-items: center;
    }

    /* the white line */
    .track-line {
      position: absolute;
      left: 0; right: 0;
      top: 50%;
      transform: translateY(-50%);
      height: 1.5px;
      background: var(--white);
    }

    /* the triangle marker */
    #triangleMarker {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 24px;
      height: 20px;
      overflow: visible;
    }

  </style>
</head>
<body>
<div class="page">

  <!-- HERO -->
  <header class="hero">
    <span class="hero-line">Stop your crying<span class="comma">,</span>&nbsp;baby<span class="comma">.</span></span>
    <span class="hero-line">It'll be Alright</span>
  </header>

  <!-- HEARTBEAT MONITOR -->
  <section class="monitor-section">
    <div class="monitor-wrap">
      <canvas id="heartCanvas"></canvas>
    </div>
    <p class="monitor-label">It's only that the end is near.</p>
  </section>

  <!-- TRIANGLE TRACK -->
  <section class="triangle-section">
    <div class="track">
      <div class="track-line"></div>
      <svg id="triangleMarker" width="24" height="20" viewBox="-12 -10 24 20" overflow="visible">
        <polygon points="0,10 -11,-10 11,-10" fill="black" stroke="white" stroke-width="2.5" stroke-linejoin="round"/>
      </svg>
    </div>
    <p class="triangle-label">we got to get away from here</p>
  </section>

</div>

<script>
  // ── DATE CONSTANTS ──────────────────────────────────────────
  const FLATLINE_DATE   = new Date('2026-04-30T00:00:00');
  const TRIANGLE_END    = new Date('2026-04-25T00:00:00');
  const TRIANGLE_START  = new Date('2026-04-01T00:00:00');

  // ── HEARTBEAT CANVAS ────────────────────────────────────────
  const canvas = document.getElementById('heartCanvas');
  const ctx    = canvas.getContext('2d');
  let offset   = 0;
  let animId;

  function resizeCanvas() {
    canvas.width  = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  // One ECG spike shape (normalised 0–1 x-range, amplitude in px)
  function ecgSegment(startX, w, h, mid) {
    // returns array of [x,y] points for one beat cycle
    const pts = [];
    const flatY = mid;
    // baseline lead-in
    pts.push([startX,           flatY]);
    pts.push([startX + w*0.35,  flatY]);
    // P wave (small bump)
    pts.push([startX + w*0.37,  flatY - h*0.08]);
    pts.push([startX + w*0.40,  flatY]);
    // PR segment
    pts.push([startX + w*0.45,  flatY]);
    // Q dip
    pts.push([startX + w*0.47,  flatY + h*0.12]);
    // R spike
    pts.push([startX + w*0.49,  flatY - h*0.90]);
    // S dip
    pts.push([startX + w*0.51,  flatY + h*0.18]);
    // ST segment
    pts.push([startX + w*0.55,  flatY]);
    // T wave
    pts.push([startX + w*0.60,  flatY - h*0.20]);
    pts.push([startX + w*0.65,  flatY]);
    // baseline tail
    pts.push([startX + w,       flatY]);
    return pts;
  }

  function drawHeart(ts) {
    const W = canvas.width, H = canvas.height;
    const mid = H * 0.55;
    const isFlat = new Date() >= FLATLINE_DATE;

    ctx.clearRect(0, 0, W, H);

    // subtle horizontal scanlines
    for (let y = 0; y < H; y += 3) {
      ctx.fillStyle = 'rgba(0,0,0,0.12)';
      ctx.fillRect(0, y, W, 1);
    }

    const cycleW = 160; // px per heartbeat cycle
    const speed  = 1.2; // px per frame

    if (!isFlat) offset = (offset + speed) % cycleW;

    ctx.save();
    ctx.strokeStyle = isFlat ? '#444' : '#c0392b';
    ctx.lineWidth   = isFlat ? 1.5 : 2;
    ctx.shadowColor = isFlat ? 'transparent' : '#e74c3c';
    ctx.shadowBlur  = isFlat ? 0 : 8;
    ctx.lineJoin    = 'round';
    ctx.lineCap     = 'round';

    ctx.beginPath();

    if (isFlat) {
      ctx.moveTo(0, mid);
      ctx.lineTo(W, mid);
    } else {
      // draw enough cycles to fill canvas + one extra on each side
      const startX = -cycleW + (offset % cycleW) - cycleW;
      let x = startX;
      let first = true;
      while (x < W + cycleW) {
        const pts = ecgSegment(x, cycleW, H * 0.78, mid);
        for (const [px, py] of pts) {
          if (first) { ctx.moveTo(px, py); first = false; }
          else        ctx.lineTo(px, py);
        }
        x += cycleW;
      }
    }

    ctx.stroke();
    ctx.restore();

    // dim green "MONITOR" text top-right
    ctx.font = '10px monospace';
    ctx.fillStyle = isFlat ? '#333' : '#1a3a1a';
    ctx.textAlign = 'right';
    ctx.fillText(isFlat ? 'FLATLINE' : 'LIVE', W - 10, 16);

    animId = requestAnimationFrame(drawHeart);
  }

  requestAnimationFrame(drawHeart);

  // ── TRIANGLE POSITION ───────────────────────────────────────
  function updateTriangle() {
    const now      = new Date();
    const total    = TRIANGLE_END - TRIANGLE_START;
    const elapsed  = now - TRIANGLE_START;
    // progress 0 (right edge) → 1 (left edge), clamped
    const progress = Math.min(1, Math.max(0, elapsed / total));

    const track    = document.querySelector('.track');
    const W        = track.offsetWidth;
    const leftPx   = 12;
    const rightPx  = W - 12;
    const xPos     = rightPx - (rightPx - leftPx) * progress;

    document.getElementById('triangleMarker').style.left = xPos + 'px';
  }

  updateTriangle();
  // update every minute so it's live
  setInterval(updateTriangle, 60000);
  window.addEventListener('resize', updateTriangle);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Ashwood Manor — A Text Adventure</title>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #050d05;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 2rem 1rem;
      font-family: 'VT323', 'Courier New', monospace;
    }

    #game-wrap {
      width: 720px;
      max-width: 100%;
    }

    #terminal {
      background: #0a0f0a;
      border: 2px solid #1a3a1a;
      border-radius: 4px;
      padding: 24px;
      font-family: inherit;
      font-size: 19px;
      color: #33ff33;
      min-height: 560px;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    /* CRT scanline overlay */
    #terminal::before {
      content: '';
      pointer-events: none;
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.08) 2px,
        rgba(0, 0, 0, 0.08) 4px
      );
      z-index: 10;
    }

    /* Subtle vignette */
    #terminal::after {
      content: '';
      pointer-events: none;
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.45) 100%);
      z-index: 11;
    }

    #output {
      flex: 1;
      overflow-y: auto;
      padding-bottom: 12px;
      line-height: 1.55;
    }

    #output::-webkit-scrollbar { width: 6px; }
    #output::-webkit-scrollbar-track { background: #0a0f0a; }
    #output::-webkit-scrollbar-thumb { background: #1d5c1d; border-radius: 3px; }

    .line { margin-bottom: 2px; white-space: pre-wrap; word-break: break-word; }
    .line.cmd    { color: #88ff88; }
    .line.title  { color: #55ff55; font-size: 21px; }
    .line.dim    { color: #1f8f1f; }
    .line.bright { color: #aaffaa; }
    .line.item   { color: #66ff66; }
    .line.error  { color: #cc4444; }
    .line.warn   { color: #ddaa22; }
    .line.sep    { color: #1a4a1a; }

    #input-row {
      display: flex;
      align-items: center;
      border-top: 1px solid #1a3a1a;
      padding-top: 10px;
      margin-top: 8px;
      position: relative;
      z-index: 12;
    }

    #prompt { color: #55ff55; margin-right: 6px; white-space: nowrap; }

    #cmd-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #88ff88;
      font-family: inherit;
      font-size: 19px;
      caret-color: #33ff33;
    }
  </style>
</head>
<body>
<div id="game-wrap">
  <div id="terminal">
    <div id="output"></div>
    <div id="input-row">
      <span id="prompt">&gt;&nbsp;</span>
      <input id="cmd-input" type="text" autocomplete="off" autocorrect="off"
             spellcheck="false" aria-label="Command input" maxlength="80" />
    </div>
  </div>
</div>

<script>
(function () {

/* ============================================================
   GAME DATA
   ============================================================

   To add a new item:
     1. Add a key to ITEMS with name, desc, takeable, and useWith.
     2. Drop the key name into a room's items array.

   To add a new room:
     1. Add a key to ROOMS with name, desc, shortDesc, exits, and items.
     2. Wire up the reverse exit on the neighbouring room.

   To add a locked passage:
     1. Set the exit direction to null in ROOMS.exits.
     2. Add an exitBlocked entry with item and roomUnlock fields.
     3. In the item's useWith, add a handler that calls unlockRoom().

   ============================================================ */

const ITEMS = {
  rusty_key: {
    name: "rusty key",
    desc: "An old iron key, spotted with rust. A '3' is stamped on its bow.",
    takeable: true,
    useWith: {
      locked_door: {
        msg: "You fit the rusty key into the lock. With a grinding click, the door swings open.",
        onUse: () => unlockRoom("cellar", "landing", "east")
      }
    }
  },
  lantern: {
    name: "brass lantern",
    desc: "A dented brass lantern. Its flame flickers but holds.",
    takeable: true,
    useWith: {}
  },
  old_note: {
    name: "crumpled note",
    desc: 'The note reads: "The key to the cellar is where the light is weakest."',
    takeable: true,
    useWith: {}
  },
  tome: {
    name: "leather tome",
    desc: "A heavy book bound in cracked leather. The title reads 'Forbidden Cartographies.' The pages are dense with maps of places that don't exist.",
    takeable: true,
    useWith: {}
  },
  coin: {
    name: "silver coin",
    desc: "A silver coin stamped with a face you don't recognise. It's warm to the touch.",
    takeable: true,
    useWith: {}
  }
};

const ROOMS = {
  foyer: {
    name: "Foyer",
    desc: "You stand in the entrance hall of an abandoned manor. Dust motes drift through narrow slits of pale light. A moth-eaten rug runs north toward a grand staircase. To the east is a study. The front door behind you is sealed shut.",
    shortDesc: "The dusty foyer of the manor.",
    exits: { north: "landing", east: "study" },
    exitBlocked: {},
    items: ["old_note"],
    visited: false
    /* To add an event when the player enters this room for the first time:
       onFirstEnter: () => print("A chill runs down your spine.", "warn")  */
  },
  landing: {
    name: "Grand Staircase Landing",
    desc: "A broad landing overlooks the foyer below. A cracked painting of a stern man stares down at you. Passages lead south back to the foyer, west to a library, and east to a locked door. Faint scratching sounds drift from behind it.",
    shortDesc: "The landing at the top of the stairs.",
    exits: { south: "foyer", west: "library", east: null },
    exitBlocked: {
      east: {
        item: "rusty_key",
        roomUnlock: "cellar",
        msg: "The door to the east is locked solid. You need a key."
      }
    },
    items: ["coin"],
    visited: false
  },
  study: {
    name: "The Study",
    desc: "Shelves of rotting ledgers line the walls. A mahogany desk dominates the room. A brass lantern sits on the desk, still lit, casting nervous shadows. To the west the foyer awaits.",
    shortDesc: "A dim study lined with old ledgers.",
    exits: { west: "foyer" },
    exitBlocked: {},
    items: ["lantern", "rusty_key"],
    visited: false
  },
  library: {
    name: "The Library",
    desc: "Floor-to-ceiling shelves, half-collapsed, spill their contents across the floor. Something stirred here recently — fresh footprints in the dust lead to a reading chair and back. The landing is to the east.",
    shortDesc: "A chaotic library with a recent disturbance.",
    exits: { east: "landing" },
    exitBlocked: {},
    items: ["tome"],
    visited: false
  },
  cellar: {
    name: "The Cellar",
    desc: "Stone steps descend into a low-ceilinged cellar. Rows of empty wine racks cast grid-shadows on the floor. At the far end, a hatch in the ceiling leads up. Something glints in the corner. The staircase leads west.",
    shortDesc: "A cold, stone cellar.",
    exits: { west: "landing" },
    exitBlocked: {},
    items: [],
    visited: false,
    isLocked: true
  }
};

/* ============================================================
   GAME STATE
   ============================================================ */

const state = {
  currentRoom: "foyer",
  inventory: [],
  turnCount: 0
};

/* ============================================================
   OUTPUT HELPERS
   ============================================================ */

const outputEl = document.getElementById("output");
const inputEl  = document.getElementById("cmd-input");

function print(text, cls) {
  const div = document.createElement("div");
  div.className = "line" + (cls ? " " + cls : "");
  div.textContent = text;
  outputEl.appendChild(div);
  outputEl.scrollTop = outputEl.scrollHeight;
}

function blank() { print(""); }

/* ============================================================
   ROOM DISPLAY
   ============================================================ */

function printRoom(roomId, force) {
  const room = ROOMS[roomId];
  blank();
  print("[ " + room.name.toUpperCase() + " ]", "title");
  print("─".repeat(38), "sep");

  if (!room.visited || force) {
    print(room.desc, "bright");
    if (!room.visited && typeof room.onFirstEnter === "function") room.onFirstEnter();
    room.visited = true;
  } else {
    print(room.shortDesc, "bright");
  }

  const here = (room.items || []).filter(id => ITEMS[id]);
  if (here.length) {
    blank();
    here.forEach(id => print("  A " + ITEMS[id].name + " is here.", "item"));
  }

  const normalExits  = Object.entries(room.exits).filter(([, dest]) => dest !== null).map(([d]) => d.toUpperCase());
  const blockedExits = Object.keys(room.exitBlocked || {}).map(d => d.toUpperCase());
  const allExits     = [...new Set([...normalExits, ...blockedExits])];
  blank();
  print("Exits: " + (allExits.length ? allExits.join("  ") : "none"), "dim");
  blank();
}

/* ============================================================
   UNLOCK HELPER
   ============================================================ */

function unlockRoom(roomId, fromRoom, direction) {
  ROOMS[roomId].isLocked = false;
  ROOMS[fromRoom].exits[direction] = roomId;
  if (ROOMS[fromRoom].exitBlocked) delete ROOMS[fromRoom].exitBlocked[direction];
}

/* ============================================================
   COMMAND PARSER
   ============================================================ */

const DIR_ALIASES = { n: "north", s: "south", e: "east", w: "west", u: "up", d: "down" };
const DIRECTIONS   = new Set(["north","south","east","west","up","down"]);
const MOVE_VERBS   = new Set(["go","move","walk","travel","head","run","enter"]);
const LOOK_VERBS   = new Set(["look","l","examine","x","inspect","read","check","describe"]);
const TAKE_VERBS   = new Set(["take","get","pick","grab","collect","snag"]);
const DROP_VERBS   = new Set(["drop","leave","put","place","set","discard"]);
const INV_VERBS    = new Set(["inventory","inv","i","items","pockets","bag","carrying"]);
const USE_VERBS    = new Set(["use","unlock","open","insert","apply","combine"]);
const HELP_VERBS   = new Set(["help","?","commands","h","hint"]);
const QUIT_VERBS   = new Set(["quit","exit","bye","q"]);

function tokenize(raw) {
  return raw.trim().toLowerCase().replace(/[^a-z0-9 ]/g, "").split(/\s+/).filter(Boolean);
}

function findItem(partial, pool) {
  if (!partial) return null;
  const needle = partial.replace(/ /g, "_");
  return pool.find(id => {
    if (!ITEMS[id]) return false;
    return ITEMS[id].name.toLowerCase().includes(partial) || id.includes(needle);
  }) || null;
}

/* ============================================================
   COMMAND HANDLERS
   ============================================================ */

function cmdMove(tokens) {
  const room = ROOMS[state.currentRoom];
  const verb = tokens[0];
  let dir = DIRECTIONS.has(verb) ? verb : (DIR_ALIASES[verb] || tokens.slice(1).join(" "));
  dir = DIR_ALIASES[dir] || dir;

  if (!dir) { print("Go where?", "error"); return; }

  if (room.exitBlocked && room.exitBlocked[dir]) {
    const block = room.exitBlocked[dir];
    print(block.msg, "warn");
    return;
  }

  const dest = room.exits[dir];
  if (!dest) { print("You can't go that way.", "error"); return; }
  if (ROOMS[dest] && ROOMS[dest].isLocked) { print("That way is blocked.", "warn"); return; }

  state.currentRoom = dest;
  printRoom(dest);
}

function cmdLook(tokens) {
  const room = ROOMS[state.currentRoom];
  const rest = tokens.slice(1).join(" ");

  if (!rest) { printRoom(state.currentRoom, true); return; }

  const pool = [...(room.items || []), ...state.inventory];
  const found = findItem(rest, pool);
  if (!found) { print("You don't see that here.", "error"); return; }
  print(ITEMS[found].desc, "bright");
}

function cmdTake(tokens) {
  const room = ROOMS[state.currentRoom];
  const rest = tokens.slice(1).join(" ");
  if (!rest) { print("Take what?", "error"); return; }
  const found = findItem(rest, room.items || []);
  if (!found) { print("You don't see that here.", "error"); return; }
  if (!ITEMS[found].takeable) { print("You can't take that.", "warn"); return; }
  room.items = room.items.filter(i => i !== found);
  state.inventory.push(found);
  print("You pick up the " + ITEMS[found].name + ".", "bright");
}

function cmdDrop(tokens) {
  const room = ROOMS[state.currentRoom];
  const rest = tokens.slice(1).join(" ");
  if (!rest) { print("Drop what?", "error"); return; }
  const found = findItem(rest, state.inventory);
  if (!found) { print("You're not carrying that.", "error"); return; }
  state.inventory = state.inventory.filter(i => i !== found);
  room.items = [...(room.items || []), found];
  print("You set down the " + ITEMS[found].name + ".", "bright");
}

function cmdInventory() {
  blank();
  if (!state.inventory.length) {
    print("You are empty-handed.", "dim");
  } else {
    print("You are carrying:", "dim");
    state.inventory.forEach(id => print("  - " + ITEMS[id].name, "item"));
  }
  blank();
}

function cmdUse(tokens) {
  const rest = tokens.slice(1).join(" ");
  const parts = rest.split(/ on | with /);
  const itemPart   = (parts[0] || "").trim();
  const targetPart = (parts[1] || "").trim();

  const invItem = findItem(itemPart, state.inventory);
  if (!invItem) { print("You're not carrying that.", "error"); return; }

  const useMap = ITEMS[invItem].useWith || {};
  const matchedTarget = Object.keys(useMap).find(k =>
    targetPart.includes(k.replace(/_/g, " ")) ||
    (!targetPart && Object.keys(useMap).length === 1)
  );

  if (!matchedTarget) { print("You can't use that here.", "warn"); return; }

  print(useMap[matchedTarget].msg, "bright");
  if (typeof useMap[matchedTarget].onUse === "function") useMap[matchedTarget].onUse();
}

function cmdHelp() {
  blank();
  print("COMMANDS", "title");
  print("─".repeat(38), "sep");
  print("  LOOK / L             — describe your surroundings", "dim");
  print("  GO [direction]       — move (north, south, east, west)", "dim");
  print("  EXAMINE [item]       — inspect something closely", "dim");
  print("  TAKE [item]          — pick up an item", "dim");
  print("  DROP [item]          — leave an item behind", "dim");
  print("  INVENTORY / I        — see what you're carrying", "dim");
  print("  USE [item] ON [x]    — use an item on something", "dim");
  print("  QUIT                 — end the game", "dim");
  blank();
  print("Compass shorthand: N  S  E  W  U  D", "dim");
  blank();
}

/* ============================================================
   MAIN DISPATCH
   ============================================================ */

function handleCommand(raw) {
  print("> " + raw, "cmd");
  const tokens = tokenize(raw);
  if (!tokens.length) return;
  const verb = tokens[0];
  state.turnCount++;

  if (MOVE_VERBS.has(verb) || DIRECTIONS.has(verb) || DIR_ALIASES[verb]) { cmdMove(tokens); return; }
  if (LOOK_VERBS.has(verb)) { cmdLook(tokens); return; }
  if (TAKE_VERBS.has(verb)) { cmdTake(tokens); return; }
  if (DROP_VERBS.has(verb)) { cmdDrop(tokens); return; }
  if (INV_VERBS.has(verb))  { cmdInventory();  return; }
  if (USE_VERBS.has(verb))  { cmdUse(tokens);  return; }
  if (HELP_VERBS.has(verb)) { cmdHelp();       return; }
  if (QUIT_VERBS.has(verb)) { print("The manor fades to black...", "dim"); blank(); return; }

  print("You pause, unsure what you mean. (Try HELP)", "error");
}

/* ============================================================
   BOOT
   ============================================================ */

function boot() {
  print("╔════════════════════════════════════════╗", "sep");
  print("║   THE ASHWOOD MANOR  —  v1.0           ║", "title");
  print("║   A Text Adventure                     ║", "dim");
  print("╚════════════════════════════════════════╝", "sep");
  blank();
  print("Type HELP at any time for a list of commands.", "dim");
  printRoom(state.currentRoom);
}

inputEl.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    const val = inputEl.value.trim();
    if (val) handleCommand(val);
    inputEl.value = "";
  }
});

inputEl.focus();
boot();

})();
</script>
</body>
</html>

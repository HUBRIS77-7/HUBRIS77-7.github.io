<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Solar System — Incoming</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap" rel="stylesheet"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000008;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Share Tech Mono', monospace;
  }
  #wrap {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  canvas { display: block; }
  #hud {
    position: absolute;
    top: 18px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    pointer-events: none;
    z-index: 10;
  }
  #hud .label {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.55rem;
    letter-spacing: 0.35em;
    color: rgba(100,180,255,0.5);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  #hud .countdown {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    color: #4ab8ff;
    text-shadow: 0 0 20px rgba(74,184,255,0.8), 0 0 50px rgba(74,184,255,0.3);
    letter-spacing: 0.08em;
  }
  #hud .sublabel {
    font-size: 0.5rem;
    letter-spacing: 0.25em;
    color: rgba(74,184,255,0.35);
    margin-top: 3px;
  }
  #alert-bar {
    position: absolute;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.52rem;
    letter-spacing: 0.3em;
    color: rgba(74,184,255,0.4);
    white-space: nowrap;
    pointer-events: none;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="hud">
    <div class="label">⚠ UNKNOWN NARRATIVE PHYSICALITY - ARRIVAL SOON</div>
    <div class="countdown" id="cd">00:00:00:00</div>
    <div class="sublabel">days · hours · minutes · seconds</div>
  </div>
  <div id="alert-bar">TRAJECTORY LOCKED · ORIGIN: UNKNOWN · VELOCITY: 77.7 km/s</div>
</div>

<script>
// ── Canvas ───────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
function resize() {
  const s = Math.min(window.innerWidth, window.innerHeight, 820);
  canvas.width = canvas.height = s;
}
resize();
window.addEventListener('resize', resize);

// ── Countdown (single source of truth) ───────────────────────────
const START = new Date('2026-04-03T12:00:00Z').getTime();
const END   = new Date('2026-04-05T12:00:00Z').getTime();

function updateCountdown() {
  const rem = Math.max(0, END - Date.now());
  const d = Math.floor(rem / 86400000);
  const h = Math.floor((rem % 86400000) / 3600000);
  const m = Math.floor((rem % 3600000)  / 60000);
  const s = Math.floor((rem % 60000)    / 1000);
  document.getElementById('cd').textContent =
    String(d).padStart(2,'0') + ':' + String(h).padStart(2,'0') + ':' +
    String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}
setInterval(updateCountdown, 1000);
updateCountdown();

function getProgress() {
  const now = Date.now();
  return Math.min(1, Math.max(0, (now - START) / (END - START)));
}

// ── Planet data ──────────────────────────────────────────────────
const planets = [
  { name:'Mercury', a:0.091, e:0.206, peri:1.35, r:3,  color:'#b5b5b5', period:87.97,   angle:1.2 },
  { name:'Venus',   a:0.124, e:0.007, peri:2.55, r:5,  color:'#e8cda0', period:224.7,   angle:2.5 },
  { name:'Earth',   a:0.146, e:0.017, peri:1.80, r:6,  color:'#4fa3e0', period:365.25,  angle:0.8, isEarth:true },
  { name:'Mars',    a:0.180, e:0.093, peri:5.00, r:4,  color:'#c1440e', period:686.97,  angle:4.1 },
  { name:'Jupiter', a:0.333, e:0.049, peri:0.26, r:13, color:'#c88b3a', period:4332.59, angle:0.3 },
  { name:'Saturn',  a:0.451, e:0.057, peri:1.62, r:11, color:'#e4d191', period:10759.2, angle:3.6, ring:true },
  { name:'Uranus',  a:0.639, e:0.046, peri:2.98, r:8,  color:'#7de8e8', period:30688.5, angle:5.2 },
  { name:'Neptune', a:0.800, e:0.010, peri:0.78, r:7,  color:'#4b70dd', period:60182,   angle:2.0 },
];

// ── Orbital speed synced to countdown ────────────────────────────
const TOTAL_TIME = END - START;
const EARTH_SPEED = (2 * Math.PI) / TOTAL_TIME;

planets.forEach(p => {
  p.speed = EARTH_SPEED * (365.25 / p.period);
});

// ── Kepler position ──────────────────────────────────────────────
function planetPos(p, cx, cy, scale) {
  const a  = p.a * scale;
  const b  = a * Math.sqrt(1 - p.e * p.e);
  const c  = a * p.e;
  const xe = a * Math.cos(p.angle) - c;
  const ye = b * Math.sin(p.angle);
  return {
    x: cx + xe * Math.cos(p.peri) - ye * Math.sin(p.peri),
    y: cy + xe * Math.sin(p.peri) + ye * Math.cos(p.peri),
  };
}

// ── Stars ────────────────────────────────────────────────────────
const stars = Array.from({length: 320}, () => ({
  x: Math.random(), y: Math.random(),
  r: Math.random() * 1.2 + 0.2,
  a: Math.random() * 0.6 + 0.2,
}));

// ── Draw loop ────────────────────────────────────────────────────
let last = 0;
function draw(ts) {
  requestAnimationFrame(draw);
  const dt = ts - last; last = ts;
  const W = canvas.width, H = canvas.height;
  const cx = W / 2, cy = H / 2;
  const scale = W / 2;

  planets.forEach(p => p.angle += p.speed * dt);

  ctx.clearRect(0, 0, W, H);

  const bg = ctx.createRadialGradient(cx, cy, 0, cx, cy, scale);
  bg.addColorStop(0, '#00001a');
  bg.addColorStop(1, '#000008');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  stars.forEach(s => {
    ctx.beginPath();
    ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${s.a})`;
    ctx.fill();
  });

  // Orbits
  planets.forEach(p => {
    const a = p.a * scale;
    const b = a * Math.sqrt(1 - p.e * p.e);
    const c = a * p.e;
    const ecx = cx - c * Math.cos(p.peri);
    const ecy = cy - c * Math.sin(p.peri);
    ctx.save();
    ctx.translate(ecx, ecy);
    ctx.rotate(p.peri);
    ctx.beginPath();
    ctx.ellipse(0, 0, a, b, 0, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,255,255,0.07)';
    ctx.stroke();
    ctx.restore();
  });

  // Sun
  const sunGlow = ctx.createRadialGradient(cx, cy, 0, cx, cy, 60);
  sunGlow.addColorStop(0,'rgba(255,240,120,1)');
  sunGlow.addColorStop(1,'rgba(255,80,0,0)');
  ctx.beginPath(); ctx.arc(cx, cy, 60, 0, Math.PI*2);
  ctx.fillStyle = sunGlow; ctx.fill();

  ctx.beginPath(); ctx.arc(cx, cy, 18, 0, Math.PI*2);
  ctx.fillStyle = '#fffbe8'; ctx.fill();

  const earth = planets.find(p=>p.isEarth);
  const ep = planetPos(earth, cx, cy, scale);

  // Trajectory
  const originAngle = -0.62;
  const ox = cx + Math.cos(originAngle) * scale * 1.15;
  const oy = cy + Math.sin(originAngle) * scale * 1.15;

  ctx.setLineDash([6,8]);
  ctx.beginPath(); ctx.moveTo(ox,oy); ctx.lineTo(ep.x,ep.y);
  ctx.strokeStyle='rgba(74,184,255,0.45)';
  ctx.stroke();
  ctx.setLineDash([]);

  const prog = getProgress();
  const dotX = ox + (ep.x-ox)*prog;
  const dotY = oy + (ep.y-oy)*prog;

  ctx.beginPath();
  ctx.moveTo(dotX-11,-11+dotY);
  ctx.lineTo(dotX+11,-11+dotY);
  ctx.lineTo(dotX,dotY+11);
  ctx.closePath();
  ctx.fillStyle='#000';
  ctx.fill();
  ctx.strokeStyle='#fff';
  ctx.stroke();

  // Planets
  planets.forEach(p=>{
    const pos=planetPos(p,cx,cy,scale);
    ctx.beginPath();
    ctx.arc(pos.x,pos.y,p.r,0,Math.PI*2);
    ctx.fillStyle=p.color;
    ctx.fill();
  });
}
requestAnimationFrame(draw);
</script>
</body>
</html>
